services:
  ecr-viewer:
    image: ghcr.io/cdcgov/dibbs-ecr-viewer/ecr-viewer:${ECR_VIEWER_VERSION:-8.6.0}
    container_name: dibbs-ecr-viewer
    restart: always
    env_file: "env/dibbs-ecr-viewer.env"
    ports:
      - "3000:3000"
    networks:
      - dibbs

  ingestion:
    image: ghcr.io/cdcgov/dibbs-ecr-viewer/ingestion:${INGESTION_VERSION:-8.6.0}
    container_name: dibbs-ingestion
    restart: always
    ports:
      - "8080:8080"
    networks:
      - dibbs

  fhir-converter:
    image: ghcr.io/cdcgov/dibbs-ecr-viewer/fhir-converter:${FHIR_CONVERTER_VERSION:-8.6.0}
    container_name: dibbs-fhir-converter
    restart: always
    ports:
      - "8082:8080"
    networks:
      - dibbs

  message-parser:
    image: ghcr.io/cdcgov/dibbs-ecr-viewer/message-parser:${MESSAGE_PARSER_VERSION:-8.6.0}
    container_name: dibbs-message-parser
    restart: always
    ports:
      - "8083:8080"
    networks:
      - dibbs

  trigger-code-reference:
    image: ghcr.io/cdcgov/dibbs-ecr-viewer/trigger-code-reference:${TRIGGER_CODE_REFERENCE_VERSION:-8.6.0}
    container_name: dibbs-trigger-code-reference
    restart: always
    ports:
      - "8084:8080"
    networks:
      - dibbs

  orchestration:
    image: ghcr.io/cdcgov/dibbs-ecr-viewer/orchestration:${ORCHESTRATION_VERSION:-8.6.0}
    container_name: dibbs-orchestration
    env_file: "env/dibbs-orchestration.env"
    restart: always
    ports:
      - "8085:8080"
    networks:
      - dibbs

  docs:
    container_name: dibbs-docs
    build:
      context: ./../../docs
      dockerfile: Dockerfile
    profiles:
      - integrated
    ports:
      - "80:80"

volumes: {}

networks:
  dibbs:
